name: Build RPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install -y rpm

      - name: Set up rpmbuild tree
        run: mkdir -p $HOME/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

      - name: Build kumonoboru RPM
        run: |
          cp kumonoboru.sh            $HOME/rpmbuild/SOURCES/
          cp kumonoboru.service       $HOME/rpmbuild/SOURCES/
          cp kumonoboru.timer         $HOME/rpmbuild/SOURCES/
          cp kumonoboru-prune.service $HOME/rpmbuild/SOURCES/
          cp kumonoboru-prune.timer   $HOME/rpmbuild/SOURCES/
          cp kumonoboru.spec          $HOME/rpmbuild/SPECS/
          rpmbuild -bb $HOME/rpmbuild/SPECS/kumonoboru.spec

      - name: Upload RPM to release
        uses: softprops/action-gh-release@v2
        with:
          files: ~/rpmbuild/RPMS/noarch/*.rpm
