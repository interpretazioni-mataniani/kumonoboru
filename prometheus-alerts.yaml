  - name: Backups
    rules:
    - alert: KumonoboruFailure
      expr: |
        node_systemd_unit_state{name="kumonoboru.service", state="failed"} == 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Kumonoboru service is in a failed state"
        description: "kumonoboru.service has failed on {{ $labels.instance }}"
        source: 'https://monitor.your-domain.com'

    - alert: KumonoboruTimerFailure
      expr: |
        node_systemd_unit_state{name="kumonoboru.timer", state="failed"} == 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Kumonoboru timer is in a failed state"
        description: "kumonoboru.timer has failed on {{ $labels.instance }} — backups will not run"
        source: 'https://monitor.your-domain.com'

    - alert: SystemBackupFailed
      expr: |
        system_backup == 1
      labels:
        severity: critical
      annotations:
        summary: "Backup failed"
        description: "Repository {{ $labels.name }} failed to back up"

    - alert: SystemBackupSkipped
      expr: |
        system_backup == -1
      labels:
        severity: warning
      annotations:
        summary: "Backup skipped — repository in use"
        description: "Repository {{ $labels.name }} was already locked by a running restic process; backup was skipped"

    - alert: SystemBackupIntegrityFailed
      expr: |
        system_backup == -2
      labels:
        severity: critical
      annotations:
        summary: "Backup integrity check failed"
        description: "Repository {{ $labels.name }} failed its integrity check — backup data may be corrupted"

    - alert: SystemBackupCleaningFailed
      expr: |
        system_backup == -3
      labels:
        severity: critical
      annotations:
        summary: "Backup prune failed"
        description: "Repository {{ $labels.name }} failed the prune process — excess snapshots may accumulate"

    - alert: SystemBackupSucceeded
      expr: |
        system_backup == 0
      labels:
        severity: info
      annotations:
        summary: "Backup succeeded"
        description: "Repository {{ $labels.name }} successfully completed backup"

    - alert: SystemBackupIntegritySucceeded
      expr: |
        system_backup == 2
      labels:
        severity: info
      annotations:
        summary: "Backup integrity check passed"
        description: "Repository {{ $labels.name }} passed its integrity check"

    - alert: SystemBackupCleaningSucceeded
      expr: |
        system_backup == 3
      labels:
        severity: info
      annotations:
        summary: "Backup prune succeeded"
        description: "Repository {{ $labels.name }} successfully pruned old snapshots"
